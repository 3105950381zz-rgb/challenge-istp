<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<meta property="og:title" content="挽回ISTP挑战">
<meta property="og:description" content="ISTP的自由领地，你能进入吗？">
<meta property="og:image" content="https://3105950381zz-rgb.github.io/challenge-istp/qrcode.jpg">
<meta property="og:url" content="https://3105950381zz-rgb.github.io/challenge-istp/">
<meta property="og:type" content="website">
<meta name="description" content="ISTP的自由领地，你能进入吗？">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>挽回 ISTP 挑战</title>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:#1a150e;color:#f0ece4;min-height:100vh;overflow-x:hidden}

/* Animated bg */
.bg{position:fixed;inset:0;z-index:-2;background:radial-gradient(ellipse at 30% 20%,rgba(245,158,11,.08),transparent 50%),radial-gradient(ellipse at 70% 80%,rgba(217,119,6,.04),transparent 50%),#1a150e}
.particles{position:fixed;inset:0;z-index:-1;pointer-events:none}
.p{position:absolute;width:2px;height:2px;background:rgba(245,158,11,.2);border-radius:50%;animation:drift linear infinite}
@keyframes drift{0%{transform:translateY(100vh) scale(0);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateY(-10vh) scale(1);opacity:0}}

/* Screen shake */
@keyframes shake{0%,100%{transform:translateX(0)}10%,30%,50%,70%,90%{transform:translateX(-6px)}20%,40%,60%,80%{transform:translateX(6px)}}
.shake{animation:shake .5s}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fi{animation:fadeIn .4s ease}

/* ===== HEADER ===== */
.hd{text-align:center;padding:32px 20px 20px;position:relative}
.hd-badge{display:inline-block;padding:3px 12px;border-radius:6px;font-size:10px;font-weight:600;background:rgba(245,158,11,.1);color:#f59e0b;letter-spacing:1px;margin-bottom:10px;border:1px solid rgba(245,158,11,.15)}
.hd h1{font-size:28px;font-weight:800;letter-spacing:-.5px;background:linear-gradient(135deg,#f0ece4,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hd p{font-size:12px;color:rgba(240,236,228,.3);margin-top:6px}

.ct{max-width:480px;margin:0 auto;padding:0 14px 30px}

/* ===== HOME ===== */
.home{text-align:center;padding:20px 0}
.home-icon{font-size:72px;margin-bottom:12px;display:block}
.home-sub{font-size:13px;color:rgba(240,236,228,.4);margin-bottom:4px;letter-spacing:1px}
.home-title{font-size:22px;font-weight:800;margin-bottom:6px;color:#f0ece4}
.home-desc{font-size:12px;color:rgba(240,236,228,.3);line-height:1.7;margin:8px 0 20px;padding:0 10px}
.home-stats{display:flex;gap:12px;justify-content:center;margin-bottom:20px}
.home-stats span{padding:4px 12px;border-radius:6px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.04);font-size:11px;color:rgba(240,236,228,.4)}

/* ===== BUTTON ===== */
.btn{width:100%;padding:9px;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px}
.btn:active{transform:scale(.97)}
.btn-primary{background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;box-shadow:0 4px 20px rgba(245,158,11,.2)}
.btn-primary:hover{box-shadow:0 6px 28px rgba(245,158,11,.3)}
.btn-second{background:rgba(255,255,255,.03);color:rgba(240,236,228,.4);border:1px solid rgba(255,255,255,.06)}
.btn-danger{background:linear-gradient(135deg,#e94560,#c23152);color:#fff}

/* ===== CARD ===== */
.card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:20px;margin-bottom:10px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#f59e0b,transparent);opacity:.5}

/* LEVEL HEADER */
.lv-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.lv-name{font-size:11px;font-weight:600;color:rgba(245,158,11,.8);letter-spacing:1px}
.lv-progress{font-size:10px;color:rgba(240,236,228,.3)}

.lv-scene{font-size:13px;color:rgba(240,236,228,.5);line-height:1.7;margin-bottom:12px;padding:12px 14px;background:rgba(255,255,255,.02);border-radius:10px;border-left:2px solid rgba(245,158,11,.3)}
.lv-line{font-size:15px;font-weight:600;color:#f0ece4;margin-bottom:16px;padding:10px 14px;background:rgba(255,255,255,.03);border-radius:10px;text-align:center;border:1px solid rgba(255,255,255,.04)}

/* OPTIONS */
.opts{display:flex;flex-direction:column;gap:7px}
.opt{width:100%;padding:13px 14px;border:1px solid rgba(255,255,255,.06);border-radius:10px;background:rgba(255,255,255,.02);font-size:13px;color:#f0ece4;cursor:pointer;text-align:left;font-family:inherit;transition:all .2s;line-height:1.4}
.opt:hover{border-color:rgba(245,158,11,.2);background:rgba(245,158,11,.04)}
.opt:active{transform:scale(.97)}
.opt .il{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:8px;font-size:10px;font-weight:700;margin-right:10px;color:#fff}
.opt .s1{background:#f59e0b}.opt .s2{background:#d97706}.opt .s3{background:#b45309}.opt .s4{background:#fbbf24}
.opt.wrong{animation:shake .5s;border-color:#e94560;background:rgba(233,69,96,.08)!important}
.opt.right{border-color:#4caf50;background:rgba(76,175,80,.08)!important}

/* ===== GAME OVER ===== */
.go-screen{text-align:center;padding:12px 0;max-width:380px;margin:0 auto}
.go-icon{font-size:44px;margin-bottom:4px;display:block}
.go-title{font-size:18px;font-weight:800;color:#e94560;margin-bottom:2px}
.go-sub{font-size:11px;color:rgba(240,236,228,.6);margin-bottom:8px}
.go-desc{font-size:12px;color:rgba(240,236,228,.7);line-height:1.5;padding:7px 10px;background:rgba(233,69,96,.04);border-radius:8px;margin-bottom:6px;border-left:2px solid #e94560}
.go-qr{width:80px;height:80px;border-radius:6px;overflow:hidden;margin:4px auto 0}
.go-qr img{width:100%;height:100%;object-fit:cover;display:block;border-radius:6px}
.go-brand{font-size:9px;color:rgba(240,236,228,.5);letter-spacing:1px;margin-bottom:2px}

/* ===== WIN ===== */
.win-screen{text-align:center;padding:12px 0}
.win-icon{font-size:44px;margin-bottom:4px;display:block}
.win-title{font-size:18px;font-weight:800;margin-bottom:2px}
.win-desc{font-size:12px;color:rgba(240,236,228,.4);line-height:1.8;padding:16px;background:rgba(245,158,11,.04);border-radius:12px;margin-bottom:16px;border-left:2px solid #f59e0b}
.win-qr{width:80px;height:80px;border-radius:6px;overflow:hidden;margin:4px auto 0}
.win-qr img{width:100%;height:100%;object-fit:cover;display:block;border-radius:6px}
.win-brand{font-size:9px;color:rgba(240,236,228,.5);letter-spacing:1px;margin-bottom:2px}

/* BRAND */
.brand{display:flex;align-items:center;gap:12px;padding:14px;border-radius:12px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);margin-top:12px}
.brand img{width:72px;height:72px;border-radius:10px;flex-shrink:0;object-fit:cover;border:1px solid rgba(255,255,255,.06)}
.brand .bn{font-size:14px;font-weight:700;color:#f0ece4;letter-spacing:2px}
.brand .bs{font-size:10px;color:rgba(240,236,228,.25);margin-top:3px;line-height:1.5}
.ft{font-size:9px;color:rgba(240,236,228,.15);text-align:center;margin-top:16px;line-height:1.6}

.stats-box{margin-bottom:6px;padding:6px 10px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);border-radius:12px}
.stats-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.stats-level{font-size:13px;font-weight:700;color:#f0ece4}
.stats-pct{font-size:12px;font-weight:800;background:linear-gradient(135deg,#feca57,#ff9ff3);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stats-track{height:4px;border-radius:3px;background:rgba(255,255,255,.06);overflow:hidden;margin-bottom:4px}
.stats-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#feca57,#ff9ff3);transition:width 1s ease}
.stats-info{font-size:9px;color:rgba(240,236,228,.55);display:flex;justify-content:space-between}
.stats-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:9px;font-weight:600;background:rgba(254,202,87,.08);color:#feca57;margin-left:4px}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(80px);padding:10px 20px;border-radius:10px;background:#1a1218;border:1px solid rgba(255,255,255,.06);font-size:13px;color:#f0ece4;box-shadow:0 4px 20px rgba(0,0,0,.3);z-index:999;opacity:0;transition:all .4s;pointer-events:none;white-space:nowrap}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="bg"></div>
<div class="particles" id="particles"></div>

<div class="hd">
  <div class="hd-badge">✦ 挽回挑战</div>
  <h1>挽回 ISTP</h1>
  <p>只有一次机会，选错就输了</p>
</div>

<div class="ct" id="app"></div>

<script>
// Particles
(function(){
  const c=document.getElementById('particles');
  for(let i=0;i<30;i++){const p=document.createElement('div');p.className='p';p.style.left=Math.random()*100+'%';p.style.animationDuration=(8+Math.random()*12)+'s';p.style.animationDelay=Math.random()*10+'s';p.style.width=p.style.height=(1+Math.random()*2)+'px';c.appendChild(p)}
})();

const DATA={
  emoji:'🔧',title:'ISTP',subtitle:'随性自由的实干家',
  desc:'ISTP 需要自由和空间。你越抓越紧、越问越多，TA就越想逃。不是不爱你，是窒息感让TA本能地想挣脱。',
  color:'#f59e0b',qrSrc:'qrcode.jpg',
  winDesc:'你给了ISTP需要的自由和空间。你没有追问、没有控制、没有情绪绑架。TA发现你是那个例外——跟你在一起不会窒息。所以TA选择了回来。',difficulty:'★★★★☆',diffLabel:'自由型 · 给空间比纠缠有用',dist:[100,95,89,81,71,60,48,37,26,17,10,5,1.5]};

// ===== URL param detection for shared results =====
(function(){
  var m=window.location.href.match(/[?&]s=(\d+)-([\d.]+)/);
  if(!m)return;
  var lvl=parseInt(m[1]),pct=parseFloat(m[2]);
  var A=document.getElementById("app");
  A.innerHTML=`<div style="text-align:center;padding:20px 0">
    <div style="background:linear-gradient(145deg,rgba(255,255,255,.04),rgba(255,255,255,.01));border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:28px 20px;position:relative;overflow:hidden">
      <div style="position:absolute;top:-60px;right:-60px;width:120px;height:120px;border-radius:50%;background:radial-gradient(circle,rgba(254,202,87,.1),transparent 70%)"></div>
      <div style="font-size:48px;margin-bottom:6px">${DATA.emoji}</div>
      <div style="font-size:20px;font-weight:800;letter-spacing:1px">闯关成绩</div>
      <div style="font-size:11px;color:rgba(240,236,228,.35);margin:4px 0 16px">${DATA.subtitle}</div>
      <div style="display:flex;align-items:center;justify-content:center;gap:20px;margin:0 0 12px;padding:16px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);border-radius:14px">
        <div><div style="font-size:48px;font-weight:800;background:linear-gradient(135deg,#feca57,#ff9ff3);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1">${lvl}</div><div style="font-size:10px;color:rgba(240,236,228,.25)">第 ${lvl} / 12 关</div></div>
        <div style="width:1px;height:44px;background:rgba(255,255,255,.05)"></div>
        <div><div style="font-size:38px;font-weight:800;background:linear-gradient(135deg,#feca57,#ff9ff3);-webkit-background-clip:text;-webkit-text-fill-color:transparent">${pct}%</div><div style="font-size:10px;color:rgba(240,236,228,.25)">超过的挑战者</div></div>
      </div>
      <div style="margin:0 0 12px"><div style="height:4px;border-radius:2px;background:rgba(255,255,255,.05);overflow:hidden"><div style="height:100%;width:${lvl/12*100}%;border-radius:2px;background:linear-gradient(90deg,#feca57,#ff9ff3)"></div></div></div>
      <div style="padding:10px 12px;border-radius:8px;border-left:3px solid #feca57;background:rgba(254,202,87,.03);font-size:11px;color:rgba(240,236,228,.45);line-height:1.6;margin-bottom:16px;text-align:left">${DATA.desc}</div>
      <button class="btn btn-primary" onclick="go()">▶ 我也来挑战</button>
      <div style="height:6px"></div>
      <button class="btn btn-second" onclick="shareLink()">📤 分享给好友</button>
    </div>
    <div style="width:72px;height:72px;margin:14px auto 6px;border-radius:6px;overflow:hidden"><img src="${DATA.qrSrc}" style="width:100%;height:100%;object-fit:cover;display:block;"></div>
    <div style="font-size:8px;color:rgba(240,236,228,.12);letter-spacing:1px">扫码咨询 · 同款网站制作</div>
  </div>`;
})();

const STAGES=[{scene:"TA想自己出去兜风你说带上我",line:"想自己待会。",options:["好 那你注意安全 到了跟我说一声","我带你去吧 我不吵你","你是不是嫌我烦了","我等你回来 想我了就找我"],safe:1,death:"你说不放心 TA觉得被拴住了"},{scene:"你问TA在想什么问了很多遍",line:"没什么。",options:["你肯定在想什么 你就告诉我嘛","好 不说就不说 你什么时候想说再跟我说","你是不是生我气了","不说拉倒 我还不稀罕知道呢"],safe:2,death:"你越问 TA越不想说 最后什么都不说"},{scene:"TA修东西你在旁边一直指挥",line:"我来就好。",options:["我怕你不会弄 想帮帮你","你每次都嫌我烦 我好心没好报","好 那你弄 我去给你拿点喝的","你会不会啊 要不要我来看一下"],safe:3,death:"你说你这样不对 TA让你来 你也不会"},{scene:"TA想去冒险你说太危险",line:"那算了。",options:["行 去就去 我跟着你你保护我就行","真的太危险了 换个安全点的吧","那你去吧 我在家等你","你要是有个三长两短怎么办"],safe:1,death:"算了 TA去了 但没带你"},{scene:"你给TA发了很多消息问在干嘛",line:"在忙。",options:["你在忙什么呀 跟我说说呗","你每次都忙 也不知道是不是不想理我","好吧你忙 但你别太久了","好 不吵你 忙完找我"],safe:4,death:"在忙不是没空是没空理你"},{scene:"TA遇到问题你在旁边干着急",line:"我能处理。",options:["你搞不定就让我来试试","需要帮忙就叫我一声 我就在旁边","你每次都自己扛 我看着好心疼","让我看看什么问题 说不定我懂"],safe:2,death:"你说我担心 TA说不需要担心需要帮忙"},{scene:"TA想一个人去旅行",line:"想去走走。",options:["想去就去 注意安全 到了跟我说一声","一个人去多没意思 我请假陪你去","你是不是想一个人待着 那我怎么办","你去吧 反正我在不在你都一样"],safe:1,death:"你说一起去 TA说想一个人 包括一个人生活"},{scene:"TA不再跟你分享有趣的事了",line:"没什么好说的。",options:["你这几天都不跟我说话了 我哪里做错了","你是不是有别人了才不想跟我聊","那等你想说了 我随时都在","你不说那我也不说了"],safe:3,death:"没什么好说 因为跟你说了也不懂"},{scene:"你在TA专注的时候打扰TA",line:"等一下。",options:["你等一下是多久 总要有个时间吧","好我等你 但你快点","你就不能先停一下听我说句话吗","好你先忙 我不急"],safe:4,death:"你催 TA觉得你是干扰源"},{scene:"TA的情绪不对你问怎么了",line:"没事。",options:["那我陪你坐会儿","你分明有事为什么要说没事","你不说我怎么帮你 你说啊","每次都说没事 我真的好累"],safe:1,death:"你反复问 TA直接用行动解决 包括解决关系"},{scene:"TA说你不懂TA的世界",line:"算了。",options:["你的世界就是不想让我进","那你教我 我想懂你","你说得对 我确实不懂你","不懂就不懂吧 谁稀罕懂"],safe:2,death:"算了 TA回到自己的世界 不带你了"},{scene:"TA已经懒得解释了",line:"就这样吧。",options:["别这样 我们再聊聊好不好","就这样吧 你说的","好 尊重你的决定 但我还是在这里","你每次都这样 算了算了"],safe:3,death:"就这样吧 你和TA就这样了"}];

let cur=0,over=false;
const A=document.getElementById('app');
const LABELS=['A','B','C','D'];
const SK='mbti_wb';
function ls(){try{return JSON.parse(localStorage.getItem(SK))||{}}catch(e){return{}}}
function sv(t,l,w){const a=ls();if(!a[t]||a[t].best<l){a[t]={best:l,won:w,date:Date.now()}}a[t].plays=(a[t].plays||0)+1;localStorage.setItem(SK,JSON.stringify(a))}
function pct(l){const d=DATA.dist;return Math.round((100-(d[Math.min(Math.max(l-1,0),d.length-1)]||0))*10)/10}
function statsHTML(level){
  const p=pct(level);
  return '<div class="stats-box">'
    +'<div class="stats-row"><span class="stats-level">🏆 闯到第 '+level+'/12 关</span><span class="stats-pct">超过 '+p+'% 的挑战者</span></div>'
    +'<div class="stats-track"><div class="stats-fill" style="width:'+p+'%"></div></div>'
    +'<div class="stats-info"><span>📊 基于挑战者数据</span><span>'+DATA.difficulty+' <span class="stats-badge">'+DATA.diffLabel+'</span></span></div>'
    +'</div>';
}
function pbHTML(){
  const a=ls()[DATA.title];
  if(!a)return'';
  const p=pct(a.best);
  return'<div style="font-size:11px;color:rgba(240,236,228,.25);margin-bottom:16px;text-align:center">🏅 个人最佳：第 '+a.best+'/12 关 · 曾超过 '+p+'% 的挑战者</div>';
}

function hm(){
  A.innerHTML=`<div class="home">
    <span class="home-icon">${DATA.emoji}</span>
    <div class="home-sub">挽回挑战 · 只有一次机会</div>
    <div class="home-title">挽回 ${DATA.title}</div>
    <div class="home-desc">${DATA.desc}</div>
    <div class="home-stats">
      <span>💀 选错即输</span>
      <span>🏆 共${STAGES.length}关</span>
      <span>${DATA.difficulty}</span>
    </div>
    ${pbHTML()}
    <button class="btn btn-primary" onclick="go()">▶ 开始挑战</button>
    <div style="height:6px"></div>
    <button class="btn btn-primary" onclick="shareLink()" style="font-size:12px">📤 分享给朋友</button>
    <div class="brand" style="margin-top:20px">
      <img src="${DATA.qrSrc}" alt="qr"/>
      <div>
        <div class="bn">灵客星球</div>
        <div class="bs">灵客星球 · 让AI为你所用</div>
      </div>
    </div>
    
  </div>`;
}

function go(){
  cur=0;over=false;A.innerHTML='<div class="fi">'+lv()+'</div>';
}

function lv(){
  if(over)return'';
  if(cur>=STAGES.length)return end();
  const s=STAGES[cur];
  const optsHtml=s.options.map((o,i)=>`<button class="opt" onclick="pk(${i})"><span class="il s${i+1}">${LABELS[i]}</span>${o}</button>`).join('');
  return `<div class="card fi">
    <div class="lv-hd">
      <span class="lv-name">⚠️ 第${cur+1}/${STAGES.length}关</span>
      <span class="lv-progress">💀 选错就输</span>
    </div>
    <div class="lv-scene">${s.scene}</div>
    <div class="lv-line">"${s.line}"</div>
    <div class="opts">${optsHtml}</div>
  </div>`;
}

function pk(i){
  if(over)return;
  const s=STAGES[cur];
  const isCorrect=(i+1)===s.safe;
  const btns=document.querySelectorAll('.opt');
  btns.forEach(b=>b.style.pointerEvents='none');

  if(isCorrect){
    btns[i].classList.add('right');
    setTimeout(()=>{cur++;A.innerHTML='<div class="fi">'+lv()+'</div>';},500);
  } else {
    btns[i].classList.add('wrong');
    document.body.classList.add('shake');
    over=true;
    sv(DATA.title,Math.min(cur+1,STAGES.length),false);
    setTimeout(()=>{A.innerHTML=end()},700);
  }
}

function end(){
  if(over){
    const lvl=Math.min(cur+1,STAGES.length);
    const s=STAGES[Math.min(cur,STAGES.length-1)];
    return `<div class="go-screen fi" id="capArea">
      <div style="background:linear-gradient(145deg,rgba(255,255,255,.04),rgba(255,255,255,.01));border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:24px 20px;position:relative;overflow:hidden">
        <div style="position:absolute;top:-60px;right:-60px;width:120px;height:120px;border-radius:50%;background:radial-gradient(circle,rgba(233,69,96,.12),transparent 70%)"></div>
        <div style="font-size:44px;margin-bottom:6px">💀</div>
        <div style="font-size:22px;font-weight:800;color:#e94560;letter-spacing:1px">挽回失败</div>
        <div style="font-size:11px;color:rgba(240,236,228,.45);margin:4px 0 12px">你在第 ${lvl} / 12 关说错了话</div>
        ${statsHTML(lvl)}
        <div style="padding:10px 12px;border-radius:8px;border-left:3px solid #e94560;background:rgba(233,69,96,.04);font-size:12px;color:rgba(240,236,228,.65);line-height:1.5;margin-bottom:12px">${s.death}</div>
        <button class="btn btn-danger" onclick="go()">🔄 再试一次</button>
        <div style="height:6px"></div>
        <button class="btn btn-primary" onclick="shareLink()">📤 分享成绩</button>
        <div style="font-size:10px;color:rgba(240,236,228,.2);text-align:center;margin-top:5px;letter-spacing:.5px">📱 截屏 · 或点右上角 ··· 转发</div>
      </div>
      <div class="go-qr"><img src="${DATA.qrSrc}" alt="扫码"/></div>
      <div class="go-brand">灵客星球</div></div>`;
  }
  sv(DATA.title,STAGES.length,true);
  return `<div class="win-screen fi" id="capArea">
    <div style="background:linear-gradient(145deg,rgba(255,255,255,.04),rgba(255,255,255,.01));border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:24px 20px;position:relative;overflow:hidden">
      <div style="position:absolute;top:-60px;right:-60px;width:120px;height:120px;border-radius:50%;background:radial-gradient(circle,rgba(254,202,87,.12),transparent 70%)"></div>
      <div style="font-size:44px;margin-bottom:6px">🎉</div>
      <div style="font-size:22px;font-weight:800;color:#feca57;letter-spacing:1px">恭喜通关！</div>
      <div style="font-size:11px;color:rgba(240,236,228,.45);margin:4px 0 12px">你成功挽回了${DATA.title}的心</div>
      ${statsHTML(STAGES.length)}
      <div style="padding:10px 12px;border-radius:8px;border-left:3px solid #feca57;background:rgba(254,202,87,.04);font-size:12px;color:rgba(240,236,228,.65);line-height:1.5;margin-bottom:12px">${DATA.winDesc}</div>
      <button class="btn btn-primary" onclick="shareLink()">📤 分享成绩</button>
      <div style="height:6px"></div>
      <button class="btn btn-second" onclick="go()">🔄 再测一次</button>
      <div style="font-size:10px;color:rgba(240,236,228,.2);text-align:center;margin-top:5px;letter-spacing:.5px">📱 截屏 · 或点右上角 ··· 转发</div>
    </div>
    <div class="win-qr"><img src="${DATA.qrSrc}" alt="扫码"/></div>
    <div class="win-brand">灵客星球</div></div>`;
}function st(m){
  const t=document.getElementById('toast');
  if(!t)return;
  t.textContent=m;t.classList.add('show');
  clearTimeout(window._tt);window._tt=setTimeout(()=>t.classList.remove('show'),2500);
}

function shareLink(){
  var url=window.location.href.split('?')[0];
  var lvl=0,pct=0;
  if(typeof over!=='undefined'&&over&&typeof cur!=='undefined'){
    lvl=Math.min(cur+1,STAGES.length);
    pct=Math.round((100-(DATA.dist[Math.min(Math.max(lvl-1,0),DATA.dist.length-1)]||0))*10)/10;
    url+='?s='+lvl+'-'+pct;
  }
  var txt='我在【挽回'+DATA.title+'挑战】';
  if(lvl>0)txt+='闯到了第'+lvl+'关！超过'+pct+'%的人！';
  txt+='你也来试试 👇 '+url;
  if(navigator.share){
    navigator.share({title:'挽回'+DATA.title+'挑战',text:txt,url:url}).catch(function(){copyText(txt)});
  }else{copyText(txt)}
}
function copyText(t){
  var e=document.createElement('textarea');
  e.value=t;e.style.position='absolute';e.style.left='0';e.style.top='0';e.style.width='100px';e.style.height='30px';e.style.opacity='0';
  document.body.appendChild(e);e.focus();e.select();
  try{document.execCommand('copy')}catch(e){}
  document.body.removeChild(e);
  st('✅ 已复制，去转发给好友吧');
}

hm();
</script>
<div class="toast" id="toast"></div>
</body>
</html>
